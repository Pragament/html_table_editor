                                    cell.value = '';
                                    cell.raw = '';
                                    cell.style = {};
                                    cell.format = 'general';
                                }
                            }
                        }
                    }
                    state.clipboard = null;
                }

                pushUndo({ type: 'paste' });
                render();
                updateSmartView();
                updateFormulaBar();
                setStatus('Pasted');
            }

            function getSelectionData() {
                const sel = state.selection;
                let rows = [],
                    cols = [];
                if (sel.type === 'cell') {
                    rows = [sel.activeRow];
                    cols = [sel.activeCol];
                } else if (sel.type === 'range') {
                    const sR = Math.min(sel.startRow, sel.endRow);
                    const eR = Math.max(sel.startRow, sel.endRow);
                    const sC = Math.min(sel.startCol, sel.endCol);
                    const eC = Math.max(sel.startCol, sel.endCol);
                    for (let r = sR; r <= eR; r++) rows.push(r);
                    for (let c = sC; c <= eC; c++) cols.push(c);
                } else if (sel.type === 'row') {
                    const r = sel.activeRow;
                    rows = [r];
                    for (let c = 0; c < COLS; c++) cols.push(c);
                } else if (sel.type === 'col') {
                    const c = sel.activeCol;
                    cols = [c];
                    for (let r = 0; r < ROWS; r++) rows.push(r);
                } else if (sel.type === 'table') {
                    for (let r = 0; r < ROWS; r++) rows.push(r);
                    for (let c = 0; c < COLS; c++) cols.push(c);
                }
                const data = [];
                for (let r of rows) {
                    const rowData = [];
                    for (let c of cols) {
                        const cell = getCell(r, c);
                        rowData.push(cell ? { ...cell } : { value: '', raw: '', style: {}, format: 'general' });
                    }
                    data.push(rowData);
                }
                return data;
            }

            function clearSelectionData() {
                const sel = state.selection;
                if (sel.type === 'cell') {
                    const cell = getCell(sel.activeRow, sel.activeCol);
                    if (cell) { cell.value = '';
                        cell.raw = '';
                        cell.style = {};
                        cell.format = 'general'; }
                } else if (sel.type === 'range') {
                    const sR = Math.min(sel.startRow, sel.endRow);
                    const eR = Math.max(sel.startRow, sel.endRow);
                    const sC = Math.min(sel.startCol, sel.endCol);
                    const eC = Math.max(sel.startCol, sel.endCol);
                    for (let r = sR; r <= eR; r++) {
                        for (let c = sC; c <= eC; c++) {
                            const cell = getCell(r, c);
                            if (cell) { cell.value = '';
                                cell.raw = '';
                                cell.style = {};
                                cell.format = 'general'; }
                        }
                    }
                } else if (sel.type === 'row') {
                    const r = sel.activeRow;
                    for (let c = 0; c < COLS; c++) {
                        const cell = getCell(r, c);
                        if (cell) { cell.value = '';
                            cell.raw = '';
                            cell.style = {};
                            cell.format = 'general'; }
                    }
                } else if (sel.type === 'col') {
                    const c = sel.activeCol;
                    for (let r = 0; r < ROWS; r++) {
                        const cell = getCell(r, c);
                        if (cell) { cell.value = '';
                            cell.raw = '';
                            cell.style = {};
                            cell.format = 'general'; }
                    }
                } else if (sel.type === 'table') {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            const cell = getCell(r, c);
                            if (cell) { cell.value = '';
                                cell.raw = '';
                                cell.style = {};
                                cell.format = 'general'; }
                        }
                    }
                }
                render();
                updateSmartView();
                updateFormulaBar();
            }

            // -------- FORMATTING --------
            function applyFormat(format) {
                const sel = state.selection;
                const cells = getSelectedCells();
                for (const { row, col } of cells) {
                    const cell = getCell(row, col);
                    if (cell) {
                        cell.format = format;
                        if (format === 'currency') {
                            const num = parseFloat(cell.value);
                            if (!isNaN(num)) cell.value = num;
                        } else if (format === 'percent') {
                            const num = parseFloat(cell.value);
                            if (!isNaN(num)) cell.value = num;
                        } else if (format === 'date') {
                            // Try to parse as date
                            if (cell.value && !isNaN(Date.parse(cell.value))) {
                                // keep as is
                            }
                        }
                    }
                }
                pushUndo({ type: 'format', format });
                render();
                updateSmartView();
                setStatus(`Applied ${format} format`);
            }

            function applyStyle(styleObj) {
                const cells = getSelectedCells();
                for (const { row, col } of cells) {
                    const cell = getCell(row, col);
                    if (cell) {
                        cell.style = { ...cell.style, ...styleObj };
                    }
                }
                pushUndo({ type: 'style', style: styleObj });
                render();
                updateSmartView();
                setStatus('Applied style');
            }

            function getSelectedCells() {
                const sel = state.selection;
                const cells = [];
                if (sel.type === 'cell') {
                    cells.push({ row: sel.activeRow, col: sel.activeCol });
                } else if (sel.type === 'range') {
                    const sR = Math.min(sel.startRow, sel.endRow);
                    const eR = Math.max(sel.startRow, sel.endRow);
                    const sC = Math.min(sel.startCol, sel.endCol);
                    const eC = Math.max(sel.startCol, sel.endCol);
                    for (let r = sR; r <= eR; r++) {
                        for (let c = sC; c <= eC; c++) {
                            cells.push({ row: r, col: c });
                        }
                    }
                } else if (sel.type === 'row') {
                    const r = sel.activeRow;
                    for (let c = 0; c < COLS; c++) cells.push({ row: r, col: c });
                } else if (sel.type === 'col') {
                    const c = sel.activeCol;
                    for (let r = 0; r < ROWS; r++) cells.push({ row: r, col: c });
                } else if (sel.type === 'table') {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) cells.push({ row: r, col: c });
                    }
                }
                return cells;
            }

            // -------- ROW / COLUMN OPERATIONS --------
            function insertRowAbove() {
                const row = state.activeCell.row;
                if (row < 0) return;
                state.cells.splice(row, 0, []);
                state.rowHeights.splice(row, 0, DEFAULT_ROW_HEIGHT);
                for (let c = 0; c < COLS; c++) {
                    state.cells[row][c] = { value: '', raw: '', style: {}, format: 'general' };
                }
                // Shift existing rows
                pushUndo({ type: 'insertRow', row });
                render();
                updateSmartView();
                setStatus(`Inserted row ${row+1}`);
            }

            function insertRowBelow() {
                const row = state.activeCell.row + 1;
                if (row > ROWS) return;
                state.cells.splice(row, 0, []);
                state.rowHeights.splice(row, 0, DEFAULT_ROW_HEIGHT);
                for (let c = 0; c < COLS; c++) {
                    state.cells[row][c] = { value: '', raw: '', style: {}, format: 'general' };
                }
                pushUndo({ type: 'insertRow', row });
                render();
                updateSmartView();
                setStatus(`Inserted row ${row+1}`);
            }

            function deleteRow() {
                const row = state.activeCell.row;
                if (row < 0 || row >= ROWS) return;
                state.cells.splice(row, 1);
                state.rowHeights.splice(row, 1);
                // Add a new empty row at the end
                state.cells.push([]);
                state.rowHeights.push(DEFAULT_ROW_HEIGHT);
                for (let c = 0; c < COLS; c++) {
                    state.cells[ROWS - 1][c] = { value: '', raw: '', style: {}, format: 'general' };
                }
                pushUndo({ type: 'deleteRow', row });
                render();
                updateSmartView();
                setStatus(`Deleted row ${row+1}`);
            }

            function insertColLeft() {
                const col = state.activeCell.col;
                if (col < 0) return;
                for (let r = 0; r < ROWS; r++) {
                    state.cells[r].splice(col, 0, { value: '', raw: '', style: {}, format: 'general' });
                }
                state.colWidths.splice(col, 0, DEFAULT_COL_WIDTH);
                pushUndo({ type: 'insertCol', col });
                render();
                updateSmartView();
                setStatus(`Inserted column ${colToLetter(col)}`);
            }

            function insertColRight() {
                const col = state.activeCell.col + 1;
                if (col > COLS) return;
                for (let r = 0; r < ROWS; r++) {
                    state.cells[r].splice(col, 0, { value: '', raw: '', style: {}, format: 'general' });
                }
                state.colWidths.splice(col, 0, DEFAULT_COL_WIDTH);
                pushUndo({ type: 'insertCol', col });
                render();
                updateSmartView();
                setStatus(`Inserted column ${colToLetter(col)}`);
            }

            function deleteCol() {
                const col = state.activeCell.col;
                if (col < 0 || col >= COLS) return;
                for (let r = 0; r < ROWS; r++) {
                    state.cells[r].splice(col, 1);
                }
                state.colWidths.splice(col, 1);
                // Add a new empty column at the end
                for (let r = 0; r < ROWS; r++) {
                    state.cells[r].push({ value: '', raw: '', style: {}, format: 'general' });
                }
                state.colWidths.push(DEFAULT_COL_WIDTH);
                pushUndo({ type: 'deleteCol', col });
                render();
                updateSmartView();
                setStatus(`Deleted column ${colToLetter(col)}`);
            }

            // -------- TABLE MOVE --------
            let moveData = null;

            function startTableMove(e) {
                e.preventDefault();
                if (state.selection.type !== 'table') {
                    selectAll();
                }
                moveData = {
                    startX: e.clientX,
                    startY: e.clientY,
                    startScrollLeft: tableWrapper.scrollLeft,
                    startScrollTop: tableWrapper.scrollTop,
                };
                document.addEventListener('mousemove', onTableMove);
                document.addEventListener('mouseup', endTableMove);
                handleTL.style.cursor = 'grabbing';
                setStatus('Drag to move table');
            }

            function onTableMove(e) {
                if (!moveData) return;
                const dx = e.clientX - moveData.startX;
                const dy = e.clientY - moveData.startY;
                tableWrapper.scrollLeft = moveData.startScrollLeft - dx;
                tableWrapper.scrollTop = moveData.startScrollTop - dy;
                // Update handles position
                updateHandles();
                updateAutofillHandle();
                updateSelectionOverlay();
            }

            function endTableMove(e) {
                document.removeEventListener('mousemove', onTableMove);
                document.removeEventListener('mouseup', endTableMove);
                handleTL.style.cursor = 'grab';
                moveData = null;
                setStatus('Table moved');
            }

            // -------- COLUMN / ROW BULK OPERATIONS (handles) --------
            let handleActionData = null;

            function startColumnHandle(e) {
                e.preventDefault();
                // Show a mini menu or toggle behavior
                const current = handleTR.querySelector('.icon').textContent;
                if (current === '⊕') {
                    // Add column to the right
                    const col = state.activeCell.col;
                    if (col < COLS - 1) {
                        insertColRight();
                    } else {
                        // Add at end
                        insertColRight();
                    }
                    handleTR.querySelector('.icon').textContent = '⊖';
                    setTimeout(() => {
                        handleTR.querySelector('.icon').textContent = '⊕';
                    }, 800);
                    setStatus('Added column');
                } else {
                    // Delete column
                    deleteCol();
                    handleTR.querySelector('.icon').textContent = '⊕';
                    setStatus('Deleted column');
                }
            }

            function startRowHandle(e) {
                e.preventDefault();
                const current = handleBL.querySelector('.icon').textContent;
                if (current === '⊕') {
                    insertRowBelow();
                    handleBL.querySelector('.icon').textContent = '⊖';
                    setTimeout(() => {
                        handleBL.querySelector('.icon').textContent = '⊕';
                    }, 800);
                    setStatus('Added row');
                } else {
                    deleteRow();
                    handleBL.querySelector('.icon').textContent = '⊕';
                    setStatus('Deleted row');
                }
            }

            // -------- RESIZE TABLE (bottom-right handle) --------
            let resizeTableData = null;

            function startResizeTable(e) {
                e.preventDefault();
                resizeTableData = {
                    startX: e.clientX,
                    startY: e.clientY,
                    startCols: COLS,
                    startRows: ROWS,
                    startWidth: state.colWidths.reduce((a, b) => a + b, 0),
                    startHeight: state.rowHeights.reduce((a, b) => a + b, 0),
                    shift: e.shiftKey,
                };
                document.addEventListener('mousemove', onResizeTable);
                document.addEventListener('mouseup', endResizeTable);
                setStatus('Resize table');
            }

            function onResizeTable(e) {
                if (!resizeTableData) return;
                const dx = e.clientX - resizeTableData.startX;
                const dy = e.clientY - resizeTableData.startY;

                // Determine new row/col count based on distance
                const colDelta = Math.round(dx / 20);
                const rowDelta = Math.round(dy / 20);

                let newCols = Math.max(3, resizeTableData.startCols + colDelta);
                let newRows = Math.max(3, resizeTableData.startRows + rowDelta);

                if (resizeTableData.shift) {
                    // Proportional: keep aspect ratio
                    const ratio = resizeTableData.startCols / resizeTableData.startRows;
                    const avgDelta = Math.round((colDelta + rowDelta) / 2);
                    newCols = Math.max(3, resizeTableData.startCols + avgDelta);
                    newRows = Math.max(3, Math.round(newCols / ratio));
                }

                // Clamp
                newCols = Math.min(52, newCols);
                newRows = Math.min(200, newRows);

                // Resize the table
                resizeTableTo(newRows, newCols);
                render();
                updateHandles();
                updateAutofillHandle();
                updateSelectionOverlay();
            }

            function endResizeTable(e) {
                document.removeEventListener('mousemove', onResizeTable);
                document.removeEventListener('mouseup', endResizeTable);
                if (resizeTableData) {
                    pushUndo({ type: 'resizeTable', rows: ROWS, cols: COLS });
                    resizeTableData = null;
                    setStatus('Table resized');
                }
            }

            function resizeTableTo(newRows, newCols) {
                // Adjust rows
                while (state.cells.length < newRows) {
                    const r = state.cells.length;
                    state.cells.push([]);
                    state.rowHeights.push(DEFAULT_ROW_HEIGHT);
                    for (let c = 0; c < state.cells[0].length; c++) {
                        state.cells[r][c] = { value: '', raw: '', style: {}, format: 'general' };
                    }
                }
                while (state.cells.length > newRows) {
                    state.cells.pop();
                    state.rowHeights.pop();
                }

                // Adjust columns
                for (let r = 0; r < state.cells.length; r++) {
                    while (state.cells[r].length < newCols) {
                        state.cells[r].push({ value: '', raw: '', style: {}, format: 'general' });
                    }
                    while (state.cells[r].length > newCols) {
                        state.cells[r].pop();
                    }
                }
                while (state.colWidths.length < newCols) {
                    state.colWidths.push(DEFAULT_COL_WIDTH);
                }
                while (state.colWidths.length > newCols) {
                    state.colWidths.pop();
                }
            }

            // -------- KEYBOARD SHORTCUTS --------
            function handleKeydown(e) {
                const ctrl = e.ctrlKey || e.metaKey;
                const shift = e.shiftKey;
                const alt = e.altKey;

                // If editing, handle specially
                if (state.isEditing) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        // Already handled by input
                        return;
                    }
                    if (e.key === 'Escape') {
                        // Will be handled by input
                        return;
                    }
                    // Ctrl+Enter to confirm and stay
                    if (ctrl && e.key === 'Enter') {
                        e.preventDefault();
                        const input = document.querySelector('.cell-input');
                        if (input) {
                            input.blur();
                        }
                        return;
                    }
                    // Allow normal typing
                    return;
                }

                // ----- NAVIGATION -----
                const active = state.activeCell;
                let newRow = active.row;
                let newCol = active.col;

                if (e.key === 'ArrowUp') { e.preventDefault();
                    newRow = Math.max(0, active.row - 1); } else if (e.key === 'ArrowDown') { e.preventDefault();
                    newRow = Math.min(ROWS - 1, active.row + 1); } else if (e.key === 'ArrowLeft') { e.preventDefault();
                    newCol = Math.max(0, active.col - 1); } else if (e.key === 'ArrowRight') { e.preventDefault();
                    newCol = Math.min(COLS - 1, active.col + 1); } else if (e.key === 'Home') {
                    if (ctrl) { e.preventDefault();
                        newRow = 0;
                        newCol = 0; } else { e.preventDefault();
                        newCol = 0; }
                } else if (e.key === 'End') {
                    if (ctrl) { e.preventDefault();
                        newRow = ROWS - 1;
                        newCol = COLS - 1; } else { e.preventDefault();
                        newCol = COLS - 1; }
                } else if (e.key === 'PageUp') { e.preventDefault();
                    newRow = Math.max(0, active.row - 20); } else if (e.key === 'PageDown') { e.preventDefault();
                    newRow = Math.min(ROWS - 1, active.row + 20); } else if (alt && e.key === 'PageUp') { e
                        .preventDefault();
                    newCol = Math.max(0, active.col - 10); } else if (alt && e.key === 'PageDown') { e.preventDefault();
                    newCol = Math.min(COLS - 1, active.col + 10); }

                if (newRow !== active.row || newCol !== active.col) {
                    if (shift) {
                        // Extend selection
                        const sel = state.selection;
                        if (sel.type === 'cell' || sel.type === 'range') {
                            selectRange(sel.startRow, sel.startCol, newRow, newCol);
                        } else {
                            selectCell(newRow, newCol, false);
                        }
                    } else {
                        selectCell(newRow, newCol, false);
                    }
                    return;
                }

                // ----- SELECTION SHORTCUTS -----
                if (shift && e.key === ' ') {
                    e.preventDefault();
                    selectRow(active.row);
                    return;
                }
                if (ctrl && e.key === ' ') {
                    e.preventDefault();
                    selectCol(active.col);
                    return;
                }
                if (ctrl && e.key === 'a') {
                    e.preventDefault();
                    selectAll();
                    return;
                }
                if (ctrl && shift && e.key === '*') {
                    e.preventDefault();
                    // Select current region
                    selectAll();
                    return;
                }

                // ----- EDITING -----
                if (e.key === 'Enter') {
                    e.preventDefault();
                    startEditing(active.row, active.col);
                    return;
                }
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    e.preventDefault();
                    clearSelectionData();
                    return;
                }

                // ----- COPY / PASTE / CUT -----
                if (ctrl && e.key === 'c') { e.preventDefault();
                    copySelection(); return; }
                if (ctrl && e.key === 'x') { e.preventDefault();
                    cutSelection(); return; }
                if (ctrl && e.key === 'v') { e.preventDefault();
                    pasteClipboard(); return; }
                if (ctrl && alt && e.key === 'v') { e.preventDefault(); /* Paste special */ return; }

                // ----- UNDO / REDO -----
                if (ctrl && e.key === 'z') { e.preventDefault();
                    undo(); return; }
                if (ctrl && e.key === 'y') { e.preventDefault();
                    redo(); return; }

                // ----- FORMATTING -----
                if (ctrl && shift && e.key === '~') { e.preventDefault();
                    applyFormat('general'); return; }
                if (ctrl && shift && e.key === '$') { e.preventDefault();
                    applyFormat('currency'); return; }
                if (ctrl && shift && e.key === '%') { e.preventDefault();
                    applyFormat('percent'); return; }
                if (ctrl && shift && e.key === '#') { e.preventDefault();
                    applyFormat('date'); return; }
                if (ctrl && shift && e.key === '@') { e.preventDefault();
                    applyFormat('time'); return; }
                if (ctrl && shift && e.key === '^') { e.preventDefault();
                    applyFormat('scientific'); return; }

                // ----- BOLD / ITALIC / UNDERLINE -----
                if (ctrl && e.key === 'b') { e.preventDefault();
                    applyStyle({ bold: !getCurrentStyle('bold') }); return; }
                if (ctrl && e.key === 'i') { e.preventDefault();
                    applyStyle({ italic: !getCurrentStyle('italic') }); return; }
                if (ctrl && e.key === 'u') { e.preventDefault();
                    applyStyle({ underline: !getCurrentStyle('underline') }); return; }

                // ----- AUTO SUM -----
                if (alt && e.key === '=') { e.preventDefault();
                    insertAutoSum(); return; }

                // ----- MAGIC FILL -----
                if (ctrl && e.key === 'e') { e.preventDefault();
                    magicFill(); return; }

                // ----- INSERT FUNCTION -----
                if (shift && e.key === 'F3') { e.preventDefault();
                    setStatus('Insert Function dialog (simulated)'); return; }

                // ----- F4: toggle absolute refs -----
                if (e.key === 'F4') {
                    e.preventDefault();
                    // Toggle $ on formula
                    const cell = getCell(active.row, active.col);
                    if (cell && cell.raw && cell.raw.startsWith('=')) {
                        // Simple toggle: add/remove $ before column letters
                        let formula = cell.raw;
                        const refs = formula.match(/\b([A-Z]+)(\d+)\b/g);
                        if (refs) {
                            for (const ref of refs) {
                                const parts = ref.match(/([A-Z]+)(\d+)/);
                                if (parts) {
                                    const colLetter = parts[1];
                                    const rowNum = parts[2];
                                    const absRef = '$' + colLetter + '$' + rowNum;
                                    if (formula.includes(absRef)) {
                                        formula = formula.replace(absRef, colLetter + rowNum);
                                    } else {
                                        formula = formula.replace(ref, absRef);
                                    }
                                }
                            }
                            cell.raw = formula;
                            render();
                            updateFormulaBar();
                            setStatus('Toggled absolute references');
                        }
                    }
                    return;
                }

                // ----- FILL DOWN (Ctrl+D) -----
                if (ctrl && e.key === 'd') {
                    e.preventDefault();
                    fillDown();
                    return;
                }

                // ----- DATE / TIME -----
                if (ctrl && e.key === ';') {
                    e.preventDefault();
                    const now = new Date();
                    const cell = getCell(active.row, active.col);
                    if (cell) {
                        cell.value = now.toLocaleDateString();
                        cell.raw = now.toLocaleDateString();
                        cell.format = 'date';
                        render();
                        updateSmartView();
                        updateFormulaBar();
                    }
                    return;
                }
                if (ctrl && shift && e.key === ':') {
                    e.preventDefault();
                    const now = new Date();
                    const cell = getCell(active.row, active.col);
                    if (cell) {
                        cell.value = now.toLocaleTimeString();
                        cell.raw = now.toLocaleTimeString();
                        cell.format = 'time';
                        render();
                        updateSmartView();
                        updateFormulaBar();
                    }
                    return;
                }

                // ----- LINE BREAK (Alt+Enter) -----
                if (alt && e.key === 'Enter') {
                    e.preventDefault();
                    const cell = getCell(active.row, active.col);
                    if (cell) {
                        cell.raw = (cell.raw || '') + '\n';
                        cell.value = (cell.value || '') + '\n';
                        render();
                        updateFormulaBar();
                    }
                    return;
                }

                // ----- CALCULATE (Shift+F9) -----
                if (shift && e.key === 'F9') {
                    e.preventDefault();
                    render();
                    updateSmartView();
                    setStatus('Recalculated');
                    return;
                }

                // ----- TYPE TO EDIT -----
                if (e.key.length === 1 && !ctrl && !alt && !e.key.match(/[^a-zA-Z0-9 ]/)) {
                    // Start typing to edit
                    startEditing(active.row, active.col);
                    // After a short delay, insert the character
                    setTimeout(() => {
                        const input = document.querySelector('.cell-input');
                        if (input) {
                            input.value = e.key;
                            input.selectionStart = 1;
                            input.selectionEnd = 1;
                        }
                    }, 10);
                    return;
                }
            }

            // -------- HELPERS FOR KEYBOARD --------
            function getCurrentStyle(prop) {
                const cell = getCell(state.activeCell.row, state.activeCell.col);
                if (cell && cell.style) return cell.style[prop] || false;
                return false;
            }

            function fillDown() {
                const active = state.activeCell;
                const cell = getCell(active.row, active.col);
                if (!cell) return;
                // Copy from cell above
                if (active.row > 0) {
                    const above = getCell(active.row - 1, active.col);
                    if (above) {
                        cell.value = above.value;
                        cell.raw = above.raw;
                        cell.style = { ...above.style };
                        cell.format = above.format;
                        render();
                        updateSmartView();
                        updateFormulaBar();
                        setStatus('Filled down');
                    }
                }
            }

            function insertAutoSum() {
                const active = state.activeCell;
                const col = active.col;
                // Find range above with numbers
                let startRow = active.row - 1;
                while (startRow >= 0) {
                    const cell = getCell(startRow, col);
                    if (!cell || cell.value === '' || cell.value === null || cell.value === undefined) break;
                    const num = parseFloat(cell.value);
                    if (isNaN(num)) break;
                    startRow--;
                }
                startRow++;
                if (startRow < active.row) {
                    const range = colToLetter(col) + (startRow + 1) + ':' + colToLetter(col) + (active.row);
                    const cell = getCell(active.row, col);
                    if (cell) {
                        cell.raw = '=SUM(' + range + ')';
                        try {
                            const result = evaluateFormula(cell.raw, cell);
                            cell.value = result;
                        } catch (e) {
                            cell.value = '#ERROR';
                        }
                        render();
                        updateSmartView();
                        updateFormulaBar();
                        setStatus('AutoSum inserted');
                    }
                }
            }

            // -------- BIND EVENTS --------
            function bindEvents() {
                // Global
                document.addEventListener('keydown', handleKeydown);

                // Mouse up globally
                document.addEventListener('mouseup', () => {
                    if (isMouseDown) {
                        isMouseDown = false;
                        state.isSelecting = false;
                        state.selectionStart = null;
                    }
                });

                // Handles
                handleTL.addEventListener('mousedown', startTableMove);
                handleTL.addEventListener('mouseenter', () => showTooltip('Move table: drag to reposition'));
                handleTL.addEventListener('mouseleave', hideTooltip);

                handleTR.addEventListener('mousedown', startColumnHandle);
                handleTR.addEventListener('mouseenter', () => showTooltip('Add/delete columns: click to toggle'));
                handleTR.addEventListener('mouseleave', hideTooltip);
                // Toggle icon on hover
                handleTR.addEventListener('mouseenter', () => {
                    const icon = handleTR.querySelector('.icon');
                    if (icon.textContent === '⊕') icon.textContent = '⊖';
                });
                handleTR.addEventListener('mouseleave', () => {
                    const icon = handleTR.querySelector('.icon');
                    if (icon.textContent === '⊖') icon.textContent = '⊕';
                });

                handleBL.addEventListener('mousedown', startRowHandle);
                handleBL.addEventListener('mouseenter', () => showTooltip('Add/delete rows: click to toggle'));
                handleBL.addEventListener('mouseleave', hideTooltip);
                handleBL.addEventListener('mouseenter', () => {
                    const icon = handleBL.querySelector('.icon');
                    if (icon.textContent === '⊕') icon.textContent = '⊖';
                });
                handleBL.addEventListener('mouseleave', () => {
                    const icon = handleBL.querySelector('.icon');
                    if (icon.textContent === '⊖') icon.textContent = '⊕';
                });

                handleBR.addEventListener('mousedown', startResizeTable);
                handleBR.addEventListener('mouseenter', () => showTooltip('Resize table: drag diagonally (Shift=proportional)'));
                handleBR.addEventListener('mouseleave', hideTooltip);

                // AutoFill handle
                autofillHandle.addEventListener('mousedown', initAutofill);

                // Formula bar
                formulaInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const val = formulaInput.value;
                        const active = state.activeCell;
                        const cell = getCell(active.row, active.col);
                        if (cell) {
                            if (val.startsWith('=')) {
                                cell.raw = val;
                                try {
                                    const result = evaluateFormula(val, cell);
                                    cell.value = result;
                                } catch (err) {
                                    cell.value = '#ERROR';
                                }
                            } else {
                                cell.raw = val;
                                const num = parseFloat(val);
                                cell.value = isNaN(num) ? val : num;
                            }
                            pushUndo({ type: 'cellEdit', row: active.row, col: active.col, old: { ...cell } });
                            render();
                            updateSmartView();
                            updateFormulaBar();
                            setStatus('Formula applied');
                        }
                    }
                });

                // Toolbar buttons
                document.getElementById('btnUndo').addEventListener('click', undo);
                document.getElementById('btnRedo').addEventListener('click', redo);
                document.getElementById('btnBold').addEventListener('click', () => applyStyle({ bold: !getCurrentStyle(
                    'bold') }));
                document.getElementById('btnItalic').addEventListener('click', () => applyStyle({ italic: !getCurrentStyle(
                    'italic') }));
                document.getElementById('btnUnderline').addEventListener('click', () => applyStyle({ underline: !
                        getCurrentStyle('underline') }));
                document.getElementById('fontSizeSelect').addEventListener('change', (e) => {
                    applyStyle({ fontSize: parseInt(e.target.value) });
                });
                document.getElementById('btnFormatGeneral').addEventListener('click', () => applyFormat('general'));
                document.getElementById('btnFormatCurrency').addEventListener('click', () => applyFormat('currency'));
                document.getElementById('btnFormatPercent').addEventListener('click', () => applyFormat('percent'));
                document.getElementById('btnFormatDate').addEventListener('click', () => applyFormat('date'));
                document.getElementById('btnAutoSum').addEventListener('click', insertAutoSum);
                document.getElementById('btnInsertFunction').addEventListener('click', () => setStatus(
                    'Function dialog (simulated)'));
                document.getElementById('btnMagicFill').addEventListener('click', magicFill);

                // Context menu
                grid.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const el = e.target.closest('.cell');
                    if (el) {
                        const row = parseInt(el.dataset.row);
                        const col = parseInt(el.dataset.col);
                        if (!isNaN(row) && !isNaN(col)) {
                            selectCell(row, col, false);
                        }
                    }
                    showContextMenu(e.clientX, e.clientY);
                });

                // Context menu actions
                document.querySelectorAll('#contextMenu .item').forEach(item => {
                    item.addEventListener('click', () => {
                        const action = item.dataset.action;
                        switch (action) {
                            case 'copy':
                                copySelection();
                                break;
                            case 'paste':
                                pasteClipboard();
                                break;
                            case 'cut':
                                cutSelection();
                                break;
                            case 'insert-row-above':
                                insertRowAbove();
                                break;
                            case 'insert-row-below':
                                insertRowBelow();
                                break;
                            case 'insert-col-left':
                                insertColLeft();
                                break;
                            case 'insert-col-right':
                                insertColRight();
                                break;
                            case 'delete-row':
                                deleteRow();
                                break;
                            case 'delete-col':
                                deleteCol();
                                break;
                            case 'clear':
                                clearSelectionData();
                                break;
                        }
                        hideContextMenu();
                    });
                });

                // Click outside to hide context menu
                document.addEventListener('click', () => hideContextMenu());

                // Window resize
                window.addEventListener('resize', () => {
                    updateHandles();
                    updateAutofillHandle();
                    updateSelectionOverlay();
                });

                // Scroll
                tableWrapper.addEventListener('scroll', () => {
                    updateHandles();
                    updateAutofillHandle();
                    updateSelectionOverlay();
                });

                // Menu items (simple)
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const menu = item.dataset.menu;
                        if (menu === 'file') setStatus('File menu');
                        else if (menu === 'edit') setStatus('Edit menu');
                        else if (menu === 'view') setStatus('View menu');
                        else if (menu === 'table') setStatus('Table menu');
                        else if (menu === 'format') setStatus('Format menu');
                    });
                });
            }

            // -------- TOOLTIP --------
            function showTooltip(text) {
                const el = document.getElementById('tooltip');
                el.textContent = text;
                el.classList.add('visible');
                // Position near cursor
                el.style.left = (event?.clientX || 0) + 12 + 'px';
                el.style.top = (event?.clientY || 0) - 10 + 'px';
            }

            function hideTooltip() {
                document.getElementById('tooltip').classList.remove('visible');
            }

            // -------- CONTEXT MENU --------
            function showContextMenu(x, y) {
                const menu = document.getElementById('contextMenu');
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
                menu.classList.add('open');
            }

            function hideContextMenu() {
                document.getElementById('contextMenu').classList.remove('open');
            }

            // -------- STATUS --------
            function setStatus(msg) {
                statusText.textContent = msg;
                setTimeout(() => {
                    if (statusText.textContent === msg) {
                        statusText.textContent = 'Ready';
                    }
                }, 3000);
            }

            // -------- INIT --------
            init();

            // Expose for debugging
            window.__state = state;
            window.__render = render;
            window.__undo = undo;
            window.__redo = redo;

            console.log('📊 Excel App loaded!');
            console.log('Keyboard shortcuts: Ctrl+C/V/X, Ctrl+Z/Y, Ctrl+B/I/U, Ctrl+A, etc.');
            console.log('Click corner handles to manage table structure.');

        })();
    </script>
</body>
</html>
